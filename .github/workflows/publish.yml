name: Package and publish addon
on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: cooked/actions-kicad-addon@v0.1.0
        with:
          version: ${{ github.ref_name }}
          status: "development"
          deploy: false
