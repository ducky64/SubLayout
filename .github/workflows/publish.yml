name: Package and publish addon
on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Package plugin and create metadata
        run: |
            mkdir plugins
            mv sublayout plugins/
            mv __init__.py plugin.py icon_24.png plugins/
            python release_metadata.py metadata.json \
                --version "${{ github.event.release.tag_name }}"
            zip -r ${{ github.event.repository.name }}-pcm.zip plugins/ resources/ metadata.json
            python release_metadata.py metadata.json \
                --url "${{github.server_url}}/${{github.repository}}/releases/download/${{github.event.release.tag_name}}/${{ github.event.repository.name }}-pcm.zip" \
                --package ${{ github.event.repository.name }}-pcm.zip
      - name: Upload Assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ github.event.release.tag_name }}"
          files: |
            ${{ github.event.repository.name }}-pcm.zip
            metadata.json
